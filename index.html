<style>/* General Reset */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-color: #fff;
  overflow-x: hidden;
}
.header {
  background-color: #ffffff00;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* 🟦 Top Navbar */
.top-navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 10px 40px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  animation: fadeInTop 1s ease-out;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2874f0;
}


.logo span {
  font-size: 12px;
  color: #666;
  margin-left: 5px;
}

.logo strong {
  color: gold;
  font-size: 13px;
}

.nav-search input {
  width: 400px;
  padding: 10px 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background-color: #f1f3f6;
  font-size: 14px;
}


.nav-right a {
  margin-left: 20px;
  text-decoration: none;
  color: #333;
  font-size: 15px;
}

.nav-right a i {
  margin-right: 6px;
}



/* Animation: Zoom Out */
@keyframes zoomOut {
  0% {
    transform: scale(1.2);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.hero {
  text-align: center;
  padding: 50px 20px;
  position: relative;
  background: #f8f8f8;
  overflow: hidden;
}

/* Leaf Background (optional) */
.leaf-background {
  position: absolute;
  top: 0;
  left: 0;
  background: url('https://bazaar.qodeinteractive.com/wp-content/uploads/2017/07/landing-top-img-2.png') no-repeat;
  background-size: contain;
  width: 500px;
  height: 700px;
  opacity: 0.3;
  z-index: 0;
  animation: zoomOut 1.5s ease forwards;
  animation-delay: 0.1s;
}

.h3 {
  font-size: 20px;
  color: #888;
  
}
.slogan {
     font-family: 'Brush Script MT', cursive;
  font-size: 24px;
  color: #7e95f4; /* adjust color as needed */
  z-index: 1;
  position: relative;
  animation: zoomOut 1.5s ease forwards;
  animation-delay: 0.3s;
  opacity: 0;

}
.log {
  font-size: 60px;
  font-weight: bold;
  text-transform: lowercase;
  z-index: 1;
  position: relative;
  animation: zoomOut 1.5s ease forwards;
  animation-delay: 0.6s;
  opacity: 0;
}

.log img {
  animation: bubbleFloat 2.5s ease-in-out infinite;
  display: inline-block;
}

/* Animation Keyframes */
@keyframes bubbleFloat {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}

.main-preview img {
  max-width: 700px;
  width: 100%;
  margin: 30px auto;
  z-index: 1;
  position: relative;
  display: block;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  animation: zoomOut 1.5s ease forwards;
  animation-delay: 1s;
  opacity: 0;
}

.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 40px;
  z-index: 1;
  position: relative;
}


/* Optional Hover Zoom Effect */
.gallery img:hover {
  transform: scale(1.05);
}
.content-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  margin-top: 50px;
  flex-wrap: wrap;
}

/* Main Preview Styling */
.main-preview img {
  max-width: 400px;
  width: 100%;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  animation: zoomOut 1.5s ease forwards;
  animation-delay: 1s;
  opacity: 0;
}

/* Gallery Columns */
.gallery-left,
.gallery-right {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.gallery-left img,
.gallery-right img {
  width: 200px;
  border-radius: 8px;
  opacity: 0;
  transform: scale(1.2);
  animation: zoomOut 1.5s ease forwards;
}

.gallery-left img:nth-child(1) { animation-delay: 1.3s; }
.gallery-left img:nth-child(2) { animation-delay: 1.5s; }
.gallery-left img:nth-child(3) { animation-delay: 1.7s; }

.gallery-right img:nth-child(1) { animation-delay: 1.9s; }
.gallery-right img:nth-child(2) { animation-delay: 2.1s; }

.gallery-left img:hover,
.gallery-right img:hover {
  transform: scale(1.05);
}
/* Base mobile responsiveness */
@media (max-width: 768px) {
  /* Center and resize the slogan */
  .slogan {
    text-align: center;
    font-size: 18px;
    padding: 10px 0;
  }

  /* Center and scale the logo */
  .log {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
  }

  .log img {
    width: 100px;
    height: auto;
  }

  /* Stack content vertically */
  .content-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }

  .gallery-left,
  .gallery-right {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
  }

  .gallery-left img,
  .gallery-right img {
    width: 45%;
    height: auto;
  }

  .main-preview img {
    width: 100%;
    max-width: 300px;
    height: auto;
    margin: 10px 0;
  }

  .main-preview {
    display: flex;
    justify-content: center;
    align-items: center;
  }
}


/* 🟨 Category Bar */
.category-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px 20px;
  background-color: #ffffff;
  border-top: 1px solid #eee;
  border-bottom: 1px solid #eee;
  flex-wrap: wrap;
  animation: fadeInBottom 1.2s ease-out;
}

.category-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 20px;
  cursor: pointer;
  transition: transform 0.3s ease;
  animation: bounceIn 0.2s ease forwards;
  opacity: 1;
  
}

.category-item img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  margin-bottom: 5px;
}

.category-item span {
  font-size: 14px;
  font-weight: 500;
  color: #111;
}

/* Hover Animation */
.category-item:hover {
  transform: translateY(-4px);
  color: #2874f0;
}
/* Animation Effects */
@keyframes fadeInTop {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInBottom {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bounceIn {
  0% {
    transform: scale(0.9) translateY(10px);
    opacity: 0;
  }
  60% {
    transform: scale(1.05) translateY(-5px);
    opacity: 1;
  }
  100% {
    transform: scale(1) translateY(0);
  }
}

/* Delay each item animation */
.category-item:nth-child(1) { animation-delay: 0.2s; }
.category-item:nth-child(2) { animation-delay: 0.4s; }
.category-item:nth-child(3) { animation-delay: 0.6s; }
.category-item:nth-child(4) { animation-delay: 0.8s; }
.category-item:nth-child(5) { animation-delay: 1s; }
.category-item:nth-child(6) { animation-delay: 1.2s; }
.category-item:nth-child(7) { animation-delay: 1.4s; }
.category-item:nth-child(8) { animation-delay: 1.6s; }

/* Mobile view */
@media (max-width: 768px) {
  .top-navbar {
    flex-direction: column;
    align-items: center;
    padding: 15px;
  }

  .nav-search input {
    width: 100%;
    margin: 10px 0;
  }

  .nav-right {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 8px;
  }

  .nav-right a {
    margin: 0;
  }

  
}
@media (max-width: 768px) {
  .category-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 columns */
    gap: 10px;
    justify-items: center;
    padding: 15px;
  }

  .category-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .category-item img {
    width: 50px;
    height: 50px;
    object-fit: contain;
    margin-bottom: 5px;
  }

  .category-item span {
    font-size: 13px;
    color: #555;
  }
}

</style>
